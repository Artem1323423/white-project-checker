appId: com.whiteproject.checker
productName: White Project Checker
files:
  - dist/**
  - dist-electron/**
  - public/**
  - node_modules/sql.js/**
  - package.json
directories:
  output: release
  buildResources: build
win:
  target:
    - nsis
  icon: public/logo.png
  requestedExecutionLevel: requireAdministrator
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: public/logo.ico
  uninstallerIcon: public/logo.ico
  installerHeaderIcon: public/logo.ico
  shortcutName: White Project Checker
publish:
  provider: github
  owner: Artem1323423
  repo: white-project-checker
